<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Audio Hub - Voice Chat & Screen Sharing</title>
    <meta name="description" content="Crystal-clear voice chat with screen sharing. Join a room and connect with anyone globally, instantly." />
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230a0a0a'/%3E%3Cpath d='M18 34v-6c0-7.7 6.3-14 14-14s14 6.3 14 14v6' fill='none' stroke='%23f8fafc' stroke-width='5' stroke-linecap='round'/%3E%3Crect x='12' y='30' width='10' height='18' rx='5' fill='%238b5cf6'/%3E%3Crect x='42' y='30' width='10' height='18' rx='5' fill='%2306b6d4'/%3E%3C/svg%3E" />
    <script>
      (function() {
        try {
          var storedTheme = localStorage.getItem('audio-hub-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = storedTheme === 'light' || storedTheme === 'dark'
            ? storedTheme
            : (prefersDark ? 'dark' : 'light');
          var root = document.documentElement;
          root.classList.remove('light', 'dark');
          root.classList.add(theme);
          root.dataset.theme = theme;
          root.style.colorScheme = theme;
          var themeColor = theme === 'dark' ? '#0a0a0a' : '#ffffff';
          document.querySelectorAll('meta[name="theme-color"]').forEach(function(meta) {
            meta.setAttribute('content', themeColor);
          });
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
